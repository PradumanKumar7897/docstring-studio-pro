[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbose output + short traceback
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Custom markers
markers =
    parser: Parser unit tests
    generation: Docstring generation tests
    validation: Validation engine tests
    integration: End-to-end pipeline tests
    ui: Streamlit UI tests
    slow: Tests that take longer to run
    ai: Tests that require AI provider credentials

# Ignore warnings from third-party libs
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
